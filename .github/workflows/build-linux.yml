# build-linux.yml — linux-x64 build + test validation
#
# Purpose: validates the library builds and all tests pass on the primary
# development platform (linux-x64). Includes both Release and Debug builds
# to catch configuration-specific issues early.

name: build-linux

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-test:
    name: linux-x64
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Secret scan with gitleaks
        uses: gitleaks/gitleaks-action@833cdc7c5d919d4b3fc08c69c0af1c26098cc0ce # v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup .NET 10 SDK
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5.4.0
        with:
          dotnet-version: |
            10.0.x

      - name: Display .NET info
        run: |
          dotnet --info
          echo "Architecture: $(uname -m)"

      - name: Check formatting
        run: dotnet format src/IthmbCodec/IthmbCodec.csproj --verify-no-changes

      - name: Restore dependencies (locked)
        run: dotnet restore src/IthmbCodec/test/IthmbCodec.Tests.csproj --locked-mode

      - name: SAST — check for vulnerable dependencies
        run: dotnet list src/IthmbCodec/IthmbCodec.csproj package --vulnerable --include-transitive 2>&1 || echo 'WARNING: vulnerable packages found (non-fatal for now)'

      - name: Build (Release)
        run: dotnet build src/IthmbCodec/test/IthmbCodec.Tests.csproj -c Release --no-restore

      - name: Build (Debug)
        run: dotnet build src/IthmbCodec/test/IthmbCodec.Tests.csproj -c Debug --no-restore

      - name: Run all tests (Release)
        run: dotnet test src/IthmbCodec/test/IthmbCodec.Tests.csproj -c Release --no-build --verbosity normal --logger trx --results-directory linux-x64-release

      - name: Run all tests (Debug)
        run: dotnet test src/IthmbCodec/test/IthmbCodec.Tests.csproj -c Debug --no-build --verbosity normal --logger trx --results-directory linux-x64-debug

      - name: Run all tests (Release) with code coverage
        run: dotnet test src/IthmbCodec/test/IthmbCodec.Tests.csproj -c Release --no-build --verbosity normal --collect "XPlat Code Coverage" --results-directory linux-x64-coverage

      - name: Check code coverage threshold (min 72%)
        run: |
          coverage_file="$(ls linux-x64-coverage/**/coverage.cobertura.xml 2>/dev/null | head -1)"
          if [ -z "$coverage_file" ]; then
            echo "No coverage file found"
            exit 1
          fi
          line_rate="$(grep -oP 'line-rate="\K[0-9.]+' "$coverage_file" | head -1)"
          if [ -z "$line_rate" ]; then
            echo "Could not parse line-rate from coverage report"
            exit 1
          fi
          pct="$(awk "BEGIN { printf \"%.1f\", $line_rate * 100 }")"
          echo "Code coverage: ${pct}%"
          if awk "BEGIN { exit (!($line_rate < 0.72)) }"; then
            echo "FAIL: Coverage ${pct}% is below 72% threshold"
            exit 1
          fi
          echo "OK: Coverage ${pct}% meets 72% threshold"

      - name: Verify README stats match source
        run: |
          trx_file="$(ls linux-x64-release/*.trx 2>/dev/null | head -1)"
          if [ -z "$trx_file" ]; then
            echo "No .trx file found -- skipping test count check"
            bash tools/check-readme-stats.sh
          else
            passed=$(grep -oP 'passed="\K[0-9]+' "$trx_file" | head -1)
            echo "Test count from .trx: $passed"
            bash tools/check-readme-stats.sh "$passed"
          fi

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: linux-x64-test-results
          path: |
            linux-x64-release
            linux-x64-debug
            linux-x64-coverage
          retention-days: 30
