name: Check Links

on:
  schedule:
    - cron: "0 6 * * 1" # weekly: Monday 06:00 UTC
  workflow_dispatch:

jobs:
  linkcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: lycheeverse/lychee-action@v2
        with:
          fail: true
          args: --verbose --no-progress '**/*.md' '**/*.html'
