name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
      - run: dotnet format --verify-no-changes --no-restore
      - run: dotnet restore src/IthmbCodec/test/IthmbCodec.Tests.csproj
      - run: dotnet test src/IthmbCodec/test/IthmbCodec.Tests.csproj -c Release --no-restore
        env:
          DOTNET_CLI_HOME: /tmp
