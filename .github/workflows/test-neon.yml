# test-neon.yml — ARM64 NEON intrinsic verification
#
# Purpose: validates all NEON-accelerated decode paths on native ARM64 hardware.
# The library has ARM64 NEON intrinsics for 3 decoders (RGB565, RGB555, UYVY)
# plus YCbCr420 SIMD and interlaced UYVY. These paths are conditionally compiled
# and JIT-dispatched via AdvSimd.IsSupported — they run ONLY on ARM64 hardware.
# No emulation or cross-compilation — this runs bare-metal on GitHub's ARM64 runners.
#
# The existing SIMD-vs-scalar identity tests (w=8 vs w<8) naturally exercise the
# NEON paths when executed on ARM64, because AdvSimd.IsSupported is true and the
# dispatcher routes to the NEON implementation.

name: test-neon

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Allow manual trigger from Actions tab
  workflow_dispatch:

permissions:
  contents: read

jobs:
  neon-verify:
    name: NEON ARM64
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup .NET 10 SDK
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5.4.0
        with:
          dotnet-version: |
            10.0.x

      - name: Display .NET info
        run: |
          dotnet --info
          echo "Architecture: $(uname -m)"
          echo "ARM NEON intrinsics: AdvSimd.IsSupported should be 'True'"

      - name: Restore dependencies
        run: dotnet restore src/IthmbCodec/test/IthmbCodec.Tests.csproj --locked-mode

      - name: Build (Release)
        run: dotnet build src/IthmbCodec/test/IthmbCodec.Tests.csproj -c Release --no-restore

      - name: Run all tests (Release) with code coverage
        run: dotnet test src/IthmbCodec/test/IthmbCodec.Tests.csproj -c Release --no-build --verbosity normal --collect "XPlat Code Coverage" --logger trx --results-directory neon

      - name: Check NEON code coverage threshold (min 60%)
        run: |
          coverage_file="$(ls neon/**/coverage.cobertura.xml 2>/dev/null | head -1)"
          if [ -z "$coverage_file" ]; then
            echo "No coverage file found"
            exit 1
          fi
          line_rate="$(grep -oP 'line-rate="\K[0-9.]+' "$coverage_file" | head -1)"
          if [ -z "$line_rate" ]; then
            echo "Could not parse line-rate from coverage report"
            exit 1
          fi
          pct="$(awk "BEGIN { printf \"%.1f\", $line_rate * 100 }")"
          echo "NEON code coverage: ${pct}%"
          if awk "BEGIN { exit (!($line_rate < 0.60)) }"; then
            echo "FAIL: NEON coverage ${pct}% is below 60% threshold"
            exit 1
          fi
          echo "OK: NEON coverage ${pct}% meets 60% threshold"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: neon-test-results
          path: neon
          retention-days: 30
