# release-windows.yml — build win-x64 Native AOT binary and upload to GitHub Release
#
# Triggers:
#   push tag v* → builds and uploads the release asset automatically.
#   workflow_dispatch with tag input → backfills old releases that are missing assets.

name: release-windows

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build for (e.g. v1.1.0). Leave empty to build HEAD.'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  build:
    name: win-x64
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.inputs.tag || github.ref_name }}

      - name: Validate tag format
        shell: pwsh
        run: |
          $tag = "${{ github.event.inputs.tag || github.ref_name }}"
          if ($tag -notmatch '^v') { throw "Tag must start with 'v' (got: $tag)" }
          echo "Tag '$tag' is valid"
      - name: Setup .NET 10 SDK
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5.4.0
        with:
          dotnet-version: |
            10.0.x

      - name: Display .NET info
        run: |
          dotnet --info
          echo "Architecture: $env:PROCESSOR_ARCHITECTURE"

      - name: Restore dependencies (locked)
        run: dotnet restore src/IthmbCodec/IthmbCodec.csproj --locked-mode

      - name: Publish Native AOT (win-x64)
        run: dotnet publish src/IthmbCodec/IthmbCodec.csproj -c Release -r win-x64 -p:IlcInstructionSet=base

      - name: Create release zip
        shell: pwsh
        run: |
          $publishDir = "src/IthmbCodec/bin/Release/net10.0/win-x64/publish"
          $files = @("$publishDir/IthmbCodec.dll", "$publishDir/igplugin.json")
          if (Test-Path "$publishDir/profiles.json") { $files += "$publishDir/profiles.json" }
          Compress-Archive -Path $files -DestinationPath IthmbCodec_win-x64.zip

      - name: Create release notes from CHANGELOG
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ github.event.inputs.tag || github.ref_name }}"
          echo "Generating release notes for $tag from CHANGELOG..."
          # Extract the CHANGELOG section for this version
          $changelog = Get-Content -Path CHANGELOG.md -Raw
          if ($changelog -match "## \[$tag"] -s*(.*?)(?=## \[|`$)" -or
              $changelog -match "## \[($tag -replace '^v','')"] -s*(.*?)(?=## \[|`$)") {
            $notes = $matches[1].Trim()
            echo "$notes" | Out-File -FilePath release-notes.md -Encoding utf8
            echo "Release notes written ($($notes.Length) chars)"
          } else {
            echo "WARNING: No CHANGELOG section found for $tag — using auto-generated notes"
            "" | Out-File -FilePath release-notes.md -Encoding utf8
          }

      - name: Create release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ github.event.inputs.tag || github.ref_name }}"
          $notes = Get-Content -Path release-notes.md -Raw
          if ([string]::IsNullOrWhiteSpace("$notes")) {
            gh release create "$tag" --generate-notes
          } else {
            gh release create "$tag" --notes-file release-notes.md
          }

      - name: Upload release asset
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ github.event.inputs.tag || github.ref_name }}"
          gh release upload "$tag" IthmbCodec_win-x64.zip --clobber
          echo "Uploaded IthmbCodec_win-x64.zip to $tag"
