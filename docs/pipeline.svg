<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 350" font-family="Arial, sans-serif" font-size="13">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#666"/></marker>
    <style>
      .box { fill: #e8f4f8; stroke: #4a90d9; stroke-width: 1.5; rx: 5; ry: 5; }
      .box-green { fill: #d4edda; stroke: #5cb85c; stroke-width: 1.5; rx: 5; ry: 5; }
      .box-orange { fill: #fdf0d5; stroke: #f0ad4e; stroke-width: 1.5; rx: 5; ry: 5; }
      .title { fill: #2c6fa0; font-weight: bold; font-size: 14px; }
      .sub { fill: #666; font-size: 11px; }
      .edge { stroke: #666; stroke-width: 1.2; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>

  <!-- Development -->
  <rect x="10" y="10" width="240" height="160" class="box" />
  <text x="130" y="30" text-anchor="middle" class="title">Development (local)</text>
  <rect x="25" y="45" width="210" height="24" class="box-green"/><text x="130" y="61" text-anchor="middle" fill="#333">dotnet build -c Release</text>
  <line x1="130" y1="69" x2="130" y2="80" class="edge"/>
  <rect x="25" y="80" width="210" height="24" class="box-green"/><text x="130" y="96" text-anchor="middle" fill="#333">dotnet test (317 tests)</text>
  <line x1="130" y1="104" x2="130" y2="115" class="edge"/>
  <rect x="25" y="115" width="210" height="24" class="box-green"/><text x="130" y="131" text-anchor="middle" fill="#333">IthmbDecoder CLI Tool</text>
  <line x1="130" y1="139" x2="130" y2="155" class="edge"/>
  <text x="130" y="168" text-anchor="middle" class="sub">0 errors, 0 warnings</text>

  <!-- CI -->
  <rect x="280" y="10" width="240" height="160" class="box" />
  <text x="400" y="30" text-anchor="middle" class="title">CI (GitHub Actions)</text>
  <rect x="295" y="45" width="210" height="24" class="box"/><text x="400" y="61" text-anchor="middle" fill="#333">git push to main</text>
  <line x1="400" y1="69" x2="400" y2="80" class="edge"/>
  <rect x="295" y="80" width="210" height="24" class="box"/><text x="400" y="96" text-anchor="middle" fill="#333">Build + 317 Tests</text>
  <line x1="400" y1="104" x2="400" y2="115" class="edge"/>
  <rect x="295" y="115" width="210" height="24" class="box"/><text x="400" y="131" text-anchor="middle" fill="#333">CodeQL Security Scan</text>

  <!-- Release -->
  <rect x="550" y="10" width="240" height="160" class="box" />
  <text x="670" y="30" text-anchor="middle" class="title">Release (manual)</text>
  <rect x="565" y="45" width="210" height="24" class="box-orange"/><text x="670" y="61" text-anchor="middle" fill="#333">dotnet publish -r win-x64</text>
  <line x1="670" y1="69" x2="670" y2="80" class="edge"/>
  <rect x="565" y="80" width="210" height="24" class="box-orange"/><text x="670" y="96" text-anchor="middle" fill="#333">Package IthmbCodec.zip</text>
  <line x1="670" y1="104" x2="670" y2="115" class="edge"/>
  <rect x="565" y="115" width="210" height="24" class="box-orange"/><text x="670" y="131" text-anchor="middle" fill="#333">GitHub Release</text>

  <!-- Usage -->
  <rect x="280" y="200" width="240" height="130" class="box" />
  <text x="400" y="220" text-anchor="middle" class="title">Usage</text>
  <rect x="295" y="235" width="210" height="24" class="box-green"/><text x="400" y="251" text-anchor="middle" fill="#333">ImageGlass v10 Plugin</text>
  <rect x="295" y="265" width="210" height="24" class="box-green"/><text x="400" y="281" text-anchor="middle" fill="#333">Standalone CLI Decoder</text>
  <line x1="400" y1="289" x2="400" y2="300" class="edge"/>
  <rect x="295" y="300" width="210" height="20" fill="#e8f4f8" stroke="#4a90d9" rx="5"/><text x="400" y="315" text-anchor="middle" fill="#666" font-size="11">BMP / PNG Output</text>

  <!-- Cross-stage arrows -->
  <line x1="250" y1="55" x2="295" y2="55" class="edge"/>
  <line x1="520" y1="55" x2="565" y2="55" class="edge"/>
  <line x1="670" y1="139" x2="670" y2="200" class="edge"/>
</svg>
