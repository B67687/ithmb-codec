<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 720 480">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0f0f23"/>
    </linearGradient>
    <linearGradient id="bar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e94560"/>
      <stop offset="50%" stop-color="#533483"/>
      <stop offset="100%" stop-color="#0f3460"/>
    </linearGradient>
  </defs>

  <!-- Outer card -->
  <rect width="720" height="480" rx="12" fill="url(#bg)" stroke="#2a2a4e" stroke-width="1.5"/>

  <!-- Title bar -->
  <rect x="0" y="0" width="720" height="40" rx="12" fill="#16213e"/>
  <rect x="0" y="20" width="720" height="20" fill="#16213e"/>

  <!-- Window control dots -->
  <circle cx="20" cy="20" r="6" fill="#e94560" opacity="0.8"/>
  <circle cx="40" cy="20" r="6" fill="#f0c040" opacity="0.8"/>
  <circle cx="60" cy="20" r="6" fill="#40c060" opacity="0.8"/>

  <!-- Title text -->
  <text x="340" y="25" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" fill="#667788">sample.ithmb — 320×240 RGB565 — ithmb-codec</text>

  <!-- Decoded image area -->
  <rect x="30" y="60" width="320" height="240" rx="4" fill="#000"/>
  <image href="../samples/synthetic/sample_decoded.png" x="30" y="60" width="320" height="240" preserveAspectRatio="xMidYMid meet"/>

  <!-- Image info panel -->
  <rect x="370" y="60" width="320" height="240" rx="4" fill="#1e1e38"/>

  <!-- Info text -->
  <text x="390" y="85" font-family="'JetBrains Mono','Fira Code',monospace" font-size="11" fill="#8899bb">Profile</text>
  <text x="460" y="85" font-family="system-ui,sans-serif" font-size="11" fill="#e0e0e0">1024 (iPod Classic 5G)</text>

  <text x="390" y="105" font-family="monospace" font-size="11" fill="#8899bb">Format</text>
  <text x="460" y="105" font-family="system-ui,sans-serif" font-size="11" fill="#e0e0e0">RGB565 (16-bit LE)</text>

  <text x="390" y="125" font-family="monospace" font-size="11" fill="#8899bb">Dimensions</text>
  <text x="460" y="125" font-family="system-ui,sans-serif" font-size="11" fill="#e0e0e0">320 × 240 pixels</text>

  <text x="390" y="145" font-family="monospace" font-size="11" fill="#8899bb">SIMD path</text>
  <text x="460" y="145" font-family="system-ui,sans-serif" font-size="11" fill="#e0e0e0">SSE2 / ARM64 NEON</text>

  <text x="390" y="165" font-family="monospace" font-size="11" fill="#8899bb">File size</text>
  <text x="460" y="165" font-family="system-ui,sans-serif" font-size="11" fill="#e0e0e0">153,604 bytes</text>

  <text x="390" y="185" font-family="monospace" font-size="11" fill="#8899bb">Test status</text>
  <text x="460" y="185" font-family="system-ui,sans-serif" font-size="11" fill="#40c060">460 / 460 passing</text>

  <text x="390" y="210" font-family="monospace" font-size="11" fill="#8899bb">Content</text>
  <text x="460" y="210" font-family="system-ui,sans-serif" font-size="11" fill="#e0e0e0">Synthetic test pattern</text>
  <text x="460" y="228" font-family="system-ui,sans-serif" font-size="10" fill="#667788">(no personal data)</text>

  <!-- Color space legend -->
  <rect x="390" y="248" width="60" height="14" rx="3" fill="#e94560"/>
  <text x="400" y="258" font-family="system-ui,sans-serif" font-size="9" fill="#fff">RGB565</text>
  <rect x="456" y="248" width="60" height="14" rx="3" fill="#0f3460"/>
  <text x="466" y="258" font-family="system-ui,sans-serif" font-size="9" fill="#fff">RGB555</text>
  <rect x="522" y="248" width="60" height="14" rx="3" fill="#533483"/>
  <text x="532" y="258" font-family="system-ui,sans-serif" font-size="9" fill="#fff">UYVY</text>
  <rect x="588" y="248" width="60" height="14" rx="3" fill="#009688"/>
  <text x="598" y="258" font-family="system-ui,sans-serif" font-size="9" fill="#fff">YUV420</text>

  <!-- Bottom status bar -->
  <rect x="0" y="460" width="720" height="20" rx="0" fill="#16213e"/>
  <rect x="0" y="468" width="720" height="12" rx="6" fill="#16213e"/>

  <text x="20" y="474" font-family="system-ui,sans-serif" font-size="10" fill="#556677">Decode pipeline: JPEG extraction → raw profile lookup → SIMD RGB565 decode → BGRA output</text>

  <!-- Synthetic badge -->
  <rect x="620" y="465" height="14" rx="3" fill="#e94560" opacity="0.8"/>
  <text x="628" y="475" font-family="system-ui,sans-serif" font-size="9" fill="#fff">SYNTHETIC TEST FILE</text>
</svg>
