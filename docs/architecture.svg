<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 700" font-family="Arial, sans-serif" font-size="13">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#666"/></marker>
    <style>
      .box { fill: #e8f4f8; stroke: #4a90d9; stroke-width: 1.5; rx: 5; ry: 5; }
      .box-dark { fill: #d4e8f0; stroke: #2c6fa0; stroke-width: 1.5; rx: 5; ry: 5; }
      .title { fill: #2c6fa0; font-weight: bold; font-size: 14px; }
      .sub { fill: #666; font-size: 11px; }
      .edge { stroke: #666; stroke-width: 1.2; fill: none; marker-end: url(#arrow); }
      .yes { fill: #5cb85c; font-size: 11px; }
      .no { fill: #d9534f; font-size: 11px; }
    </style>
  </defs>

  <!-- Top title -->
  <text x="400" y="22" text-anchor="middle" font-size="16" font-weight="bold" fill="#333">Decode Pipeline Architecture</text>

  <!-- Plugin ABI Layer -->
  <rect x="10" y="35" width="240" height="160" class="box" />
  <text x="130" y="55" text-anchor="middle" class="title">Plugin ABI Layer</text>
  <text x="130" y="70" text-anchor="middle" class="sub">[UnmanagedCallersOnly]</text>
  <rect x="25" y="80" width="210" height="28" class="box-dark"/><text x="130" y="99" text-anchor="middle" fill="#333">ig_plugin_get_api()</text>
  <rect x="25" y="115" width="210" height="28" class="box-dark"/><text x="130" y="134" text-anchor="middle" fill="#333">CodecCanHandleExtension</text>
  <rect x="25" y="150" width="210" height="28" class="box-dark"/><text x="130" y="169" text-anchor="middle" fill="#333">DecodeStaticRaster / FreePixelBuffer</text>

  <!-- Decode Pipeline -->
  <rect x="280" y="35" width="240" height="370" class="box" />
  <text x="400" y="55" text-anchor="middle" class="title">Decode Pipeline</text>
  <text x="400" y="70" text-anchor="middle" class="sub">DecodeInternal()</text>

  <rect x="295" y="80" width="210" height="24" class="box-dark"/><text x="400" y="96" text-anchor="middle" fill="#333">Size Guard (&lt; 100 MB)</text>
  <line x1="400" y1="104" x2="400" y2="115" class="edge"/>

  <rect x="295" y="115" width="210" height="24" class="box-dark"/><text x="400" y="131" text-anchor="middle" fill="#333">Peek 4 MB Header</text>
  <line x1="400" y1="139" x2="400" y2="150" class="edge"/>

  <rect x="295" y="150" width="210" height="24" class="box-dark"/><text x="400" y="166" text-anchor="middle" fill="#333">JPEG Scan (SIMD IndexOf)</text>
  <line x1="400" y1="174" x2="400" y2="185" class="edge"/>

  <!-- JFIF/Exif decision -->
  <rect x="310" y="185" width="180" height="24" fill="#f0f0f0" stroke="#999" rx="5"/>
  <text x="400" y="201" text-anchor="middle" fill="#333">JFIF/Exif within 512B?</text>
  <line x1="490" y1="197" x2="550" y2="197" class="edge"/>
  <line x1="310" y1="197" x2="250" y2="197" class="edge"/>
  <text x="520" y="193" class="no">No (raw fallback)</text>
  <text x="210" y="193" class="yes">Yes (JPEG)</text>

  <!-- JPEG Path (left side) -->
  <rect x="30" y="210" width="200" height="28" class="box"/><text x="130" y="229" text-anchor="middle" fill="#333">JPEG Path</text>
  <line x1="130" y1="238" x2="130" y2="250" class="edge"/>
  <rect x="30" y="250" width="200" height="24" fill="#d4e8f0" stroke="#2c6fa0" rx="5"/><text x="130" y="266" text-anchor="middle" fill="#333">StbImageSharp Decode</text>
  <line x1="130" y1="274" x2="130" y2="285" class="edge"/>
  <rect x="30" y="285" width="200" height="24" fill="#d4e8f0" stroke="#2c6fa0" rx="5"/><text x="130" y="301" text-anchor="middle" fill="#333">RGBA → BGRA Swap</text>

  <!-- Raw Path (right side) -->
  <rect x="550" y="215" width="200" height="28" class="box"/><text x="650" y="234" text-anchor="middle" fill="#333">Raw Path</text>
  <line x1="650" y1="243" x2="650" y2="255" class="edge"/>
  <rect x="550" y="255" width="200" height="24" fill="#d4e8f0" stroke="#2c6fa0" rx="5"/><text x="650" y="271" text-anchor="middle" fill="#333">Read 4-Byte BE Prefix</text>
  <line x1="650" y1="279" x2="650" y2="290" class="edge"/>
  <rect x="550" y="290" width="200" height="24" fill="#d4e8f0" stroke="#2c6fa0" rx="5"/><text x="650" y="306" text-anchor="middle" fill="#333">Lookup KnownProfiles[47]</text>
  <line x1="650" y1="314" x2="650" y2="325" class="edge"/>
  <rect x="550" y="325" width="200" height="24" fill="#d4e8f0" stroke="#2c6fa0" rx="5"/><text x="650" y="341" text-anchor="middle" fill="#333">Dispatch to Raw Decoder</text>

  <!-- Raw Decoders -->
  <rect x="530" y="370" width="240" height="150" class="box"/>
  <text x="650" y="390" text-anchor="middle" class="title">Raw Decoders</text>
  <text x="650" y="408" text-anchor="middle">RGB565 (SSE2, 8 px/iter)</text>
  <text x="650" y="425" text-anchor="middle">RGB555 (SSE2, 8 px/iter)</text>
  <text x="650" y="442" text-anchor="middle">UYVY (SSSE3+SSE2)</text>
  <text x="650" y="459" text-anchor="middle">YCbCr 4:2:0 (Vector128)</text>
  <text x="650" y="476" text-anchor="middle">CLCL Nibble Chroma (Scalar)</text>

  <!-- 47 Profiles -->
  <rect x="530" y="530" width="240" height="70" class="box"/>
  <text x="650" y="550" text-anchor="middle" class="title">47 Profiles</text>
  <text x="650" y="567" text-anchor="middle">22 Photo Profiles (1005–3011)</text>
  <text x="650" y="584" text-anchor="middle">25 Cover Art Profiles (1010–3005)</text>

  <!-- Output -->
  <rect x="280" y="420" width="240" height="28" class="box-dark"/><text x="400" y="439" text-anchor="middle" fill="#333">EXIF Orientation Parse</text>
  <line x1="130" y1="309" x2="400" y2="420" class="edge"/>
  <line x1="650" y1="349" x2="400" y2="420" class="edge"/>
  <line x1="400" y1="448" x2="400" y2="465" class="edge"/>
  <rect x="280" y="465" width="240" height="28" class="box"/><text x="400" y="484" text-anchor="middle" font-weight="bold" fill="#2c6fa0">BGRA Buffer + IGImageInfo</text>

  <!-- Lines from raw decoders -->
  <line x1="550" y1="395" x2="530" y2="395" class="edge"/>
  <line x1="550" y1="440" x2="400" y2="440" class="edge"/>
</svg>
